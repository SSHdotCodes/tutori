<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="chalkboard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#29473b"/>
      <stop offset="0.6" stop-color="#1b2a23"/>
      <stop offset="1" stop-color="#132019"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf6"/>
      <stop offset="1" stop-color="#f8f0dc"/>
    </linearGradient>
    <linearGradient id="luna" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9e4ff"/>
      <stop offset="1" stop-color="#b9a8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#07100b" flood-opacity=".5"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#d9cdb3" opacity=".8"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#chalkboard)"/>
  <circle cx="190" cy="170" r="220" fill="#ffffff" opacity=".025"/>
  <circle cx="1050" cy="560" r="300" fill="#e8b341" opacity=".025"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(58 44)">
      <g transform="rotate(-8 24 24)">
        <rect x="5" y="3" width="15" height="47" rx="7" fill="#f2c94c"/>
        <path d="M5 39h15l-7.5 16z" fill="#f7e6c4"/>
        <path d="M9 48h7l-3.5 7z" fill="#252923"/>
        <rect x="5" y="3" width="15" height="9" rx="5" fill="#e97868"/>
      </g>
      <text x="40" y="36" fill="#f3f6ef" font-size="43" font-weight="700" letter-spacing="-1">Tutori</text>
      <text x="177" y="34" fill="#bccbc1" font-size="19">your whiteboard tutor</text>
      <path d="M40 47 Q95 39 154 46 T278 45" fill="none" stroke="#e8b341" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g transform="translate(844 35) rotate(.8 145 31)">
      <rect width="300" height="62" rx="24" fill="url(#luna)" stroke="#8d77df" stroke-width="2"/>
      <circle cx="34" cy="31" r="14" fill="#5c47ae"/>
      <circle cx="40" cy="25" r="13" fill="#ded7ff"/>
      <text x="66" y="29" fill="#332565" font-size="18" font-weight="800">GPT-5.6 LUNA</text>
      <text x="66" y="49" fill="#52437f" font-size="13" font-weight="700" letter-spacing="1.2">POWERED BY OPENROUTER</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="56" y="122" width="1088" height="440" rx="24" fill="url(#paper)" stroke="#e1d5bb" stroke-width="3"/>
      <rect x="68" y="134" width="1064" height="416" rx="16" fill="url(#dots)"/>
    </g>

    <g transform="translate(108 180)">
      <rect x="-13" y="-28" width="168" height="36" rx="9" fill="#f8d96f" opacity=".75" transform="rotate(-1)"/>
      <text x="0" y="0" fill="#5b4519" font-size="18" font-weight="800" letter-spacing="1.2">LEARN OUT LOUD</text>
      <text x="0" y="67" fill="#292c28" font-size="57" font-weight="800" letter-spacing="-2">Ask anything.</text>
      <text x="0" y="128" fill="#292c28" font-size="57" font-weight="800" letter-spacing="-2">Watch it click.</text>
      <path d="M2 147 Q151 140 324 148" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
      <text x="0" y="194" fill="#5c574c" font-size="22">A voice-first tutor that teaches while</text>
      <text x="0" y="225" fill="#5c574c" font-size="22">drawing the idea live on a whiteboard.</text>
      <g transform="translate(0 274)">
        <rect width="184" height="42" rx="21" fill="#ece9fb" stroke="#c8c1e9"/>
        <circle cx="23" cy="21" r="7" fill="#6d55cc"/>
        <text x="40" y="28" fill="#4c3f78" font-size="16" font-weight="700">GPT-5.6 Luna</text>
        <rect x="198" width="195" height="42" rx="21" fill="#e7efe8" stroke="#bdccbf"/>
        <text x="220" y="28" fill="#355044" font-size="16" font-weight="700">Voice + live diagrams</text>
      </g>
    </g>

    <g transform="translate(678 165)">
      <text x="180" y="2" text-anchor="middle" fill="#2b2a26" font-size="24" font-weight="800">How learning compounds</text>
      <path d="M28 320V52M28 320H396" fill="none" stroke="#4d504a" stroke-width="4" stroke-linecap="round"/>
      <path d="M24 61l4-9 5 9M387 315l9 5-9 5" fill="#4d504a"/>
      <text x="212" y="354" text-anchor="middle" fill="#706b60" font-size="17" font-weight="700">clear explanations →</text>
      <text transform="translate(-2 190) rotate(-90)" text-anchor="middle" fill="#706b60" font-size="17" font-weight="700">understanding →</text>
      <path d="M45 294 C112 285 124 244 170 228 C226 208 232 153 284 135 C328 120 346 73 384 62" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
      <path d="M44 306 C120 295 172 290 217 255 C264 219 323 232 383 206" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 11" opacity=".85"/>
      <circle cx="170" cy="228" r="10" fill="#fffdf6" stroke="#2563eb" stroke-width="5"/>
      <circle cx="284" cy="135" r="10" fill="#fffdf6" stroke="#2563eb" stroke-width="5"/>
      <g transform="translate(194 182)">
        <path d="M0 25 L-20 45" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
        <rect width="158" height="40" rx="9" fill="#fff2ef" stroke="#efaaa1"/>
        <text x="79" y="26" text-anchor="middle" fill="#a52d22" font-size="15" font-weight="800">the “aha” moment</text>
      </g>
      <g transform="translate(265 274)">
        <rect width="132" height="36" rx="8" fill="#eaf7ee" stroke="#a8d6b5"/>
        <path d="M17 18h22" stroke="#16a34a" stroke-width="4" stroke-dasharray="7 5"/>
        <text x="48" y="24" fill="#367349" font-size="14" font-weight="700">practice</text>
      </g>
    </g>
  </g>
</svg>
